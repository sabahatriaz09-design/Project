<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
}

.feedback-box{
    width:350px;
    margin-left:470px;
    margin-top: 100px;
    padding:40px;
    background: #b6e6fd;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.feedback-box h2{
    text-align:center;
}

.feedback-box input,
.feedback-box textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.feedback-box button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.feedback-box button:hover{
    background:#0056b3;
}

.error{
    color:red;
    font-size:13px;
    margin-top:-5px;
    margin-bottom:5px;
}

#message{
    text-align:center;
    color:green;
    margin-top:10px;
    font-weight:bold;
}
</style>

<script>
function submitFeedback(event){
    event.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let feedback = document.getElementById("feedback").value.trim();

    let valid = true;

    // Clear previous errors
    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("feedbackError").innerText = "";
    document.getElementById("message").innerText = "";

    // Name validation
    if(name.length < 3){
        document.getElementById("nameError").innerText = "Name must be at least 3 characters";
        valid = false;
    }

    // Email validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if(!email.match(emailPattern)){
        document.getElementById("emailError").innerText = "Enter a valid email";
        valid = false;
    }

    // Feedback validation
    if(feedback.length < 10){
        document.getElementById("feedbackError").innerText = "Feedback must be at least 10 characters";
        valid = false;
    }

    // If all valid
    if(valid){
        document.getElementById("message").innerText =
        "Your feedback has been submitted successfully!";
        document.getElementById("feedbackForm").reset();
    }
}
</script>

</head>

<body>

<div class="feedback-box">
<h2>Feedback</h2>

<form id="feedbackForm" onsubmit="submitFeedback(event)">

<input type="text" id="name" placeholder="Your Name">
<div id="nameError" class="error"></div>

<input type="text" id="email" placeholder="Your Email">
<div id="emailError" class="error"></div>

<textarea id="feedback" rows="4" placeholder="Write your feedback..."></textarea>
<div id="feedbackError" class="error"></div>

<button type="submit">Submit Feedback</button>
</form>

<p id="message"></p>

</div>

</body>
</html>
